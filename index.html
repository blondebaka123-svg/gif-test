<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klikni pro překvapení!</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-family: sans-serif; color: white;
        }
        #gif { display: none; width: 100%; height: 100%; object-fit: contain; }
        #video-pozadi { display: none; }
        #text { font-size: 2.5rem; text-align: center; user-select: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="text">KLIKNI PRO PŘEKVAPENÍ! </div>
    
    <img id="gif" src="https://media.tenor.com/cHt46rvRWlQAAAAd/veronika-kazakova-blood-debt.gif" alt="GIF">

    <iframe id="video-pozadi" width="560" height="315" src="https://www.youtube.com/embed/4aBO4KN0SXQ?enablejsapi=1" frameborder="0" allow="autoplay"></iframe>

    <script>
        const body = document.body;
        const text = document.getElementById('text');
        const gif = document.getElementById('gif');
        const iframe = document.getElementById('video-pozadi');

        // Jakmile uživatel klikne kamkoliv na stránku:
        body.addEventListener('click', () => {
            text.style.display = 'none'; // Schová se text
            gif.style.display = 'block'; // Ukáže se GIF
            
            // Spustí se YouTube video na pozadí a zacyklí se
            iframe.src += "&autoplay=1&loop=1&playlist=4aBO4KN0SXQ"; 
        }, { once: true }); // { once: true } zajistí, že se to nespustí znovu, když někdo klikne víckrát
    </script>

</body>
</html>
